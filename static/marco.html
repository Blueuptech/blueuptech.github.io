<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarjetas de Memoria</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 20px;
    }
    .card {
      display: none;
      padding: 20px;
      margin: 20px auto;
      width: 300px;
      border: 1px solid #ccc;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      background-color: #f9f9f9;
    }
    .buttons {
      margin-top: 20px;
    }
    button {
      padding: 10px 20px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .correct {
      background-color: #4caf50;
      color: white;
    }
    .incorrect {
      background-color: #f44336;
      color: white;
    }
    .result {
      margin-top: 20px;
      font-size: 18px;
      display: none;
    }
  </style>
</head>
<body>

  <h1>Juego de Tarjetas de Memoria</h1>
  <div id="card-container" class="card">
    <p id="question"></p>
    <div class="buttons">
      <button id="option1" onclick="selectAnswer(1)">Opción 1</button>
      <button id="option2" onclick="selectAnswer(2)">Opción 2</button>
    </div>
    <p id="feedback" style="margin-top: 20px; font-weight: bold;"></p>
  </div>

  <div id="result" class="result"></div>
  <button id="start-button" onclick="startGame()">Iniciar Juego</button>

  <script>
    const cards = [
      // Islas
      { question: "¿Dónde está Islandia?", correct: "Atlántico Norte", incorrect: "Mediterráneo" },
      { question: "¿Dónde está Gran Bretaña?", correct: "Europa Occidental", incorrect: "Oceanía" },
      { question: "¿Dónde está Irlanda?", correct: "Europa Occidental", incorrect: "Asia" },
      { question: "¿Dónde está Córcega?", correct: "Mediterráneo", incorrect: "Atlántico" },
      { question: "¿Dónde está Cerdeña?", correct: "Mediterráneo", incorrect: "Mar del Norte" },
      { question: "¿Dónde está Sicilia?", correct: "Mediterráneo", incorrect: "Caribe" },
      { question: "¿Dónde está Creta?", correct: "Mediterráneo", incorrect: "Pacífico" },
      { question: "¿Dónde está Chipre?", correct: "Mediterráneo Oriental", incorrect: "Atlántico" },
      // Penínsulas
      { question: "¿Dónde está la Península de Kola?", correct: "Rusia", incorrect: "Escandinavia" },
      { question: "¿Dónde está la Península Escandinava?", correct: "Europa Septentrional", incorrect: "África" },
      { question: "¿Dónde está la Península de Jutlandia?", correct: "Dinamarca", incorrect: "Italia" },
      { question: "¿Dónde está la Península Itálica?", correct: "Europa Meridional", incorrect: "América" },
      { question: "¿Dónde está la Península Balcánica?", correct: "Europa del Sudeste", incorrect: "Oceanía" },
      { question: "¿Dónde está la Península de Crimea?", correct: "Europa Oriental", incorrect: "América del Norte" },
      // Cordilleras y Montes
      { question: "¿Dónde están los Montes Escandinavos?", correct: "Escandinavia", incorrect: "Asia Central" },
      { question: "¿Dónde están los Montes Urales?", correct: "Rusia", incorrect: "Europa Occidental" },
      { question: "¿Dónde están los Alpes?", correct: "Europa Central", incorrect: "Asia" },
      { question: "¿Dónde está el Macizo Central Francés?", correct: "Francia", incorrect: "Alemania" },
      { question: "¿Dónde están los Balcanes?", correct: "Europa del Sudeste", incorrect: "América del Sur" },
      { question: "¿Dónde están los Cárpatos?", correct: "Europa Oriental", incorrect: "África" },
      { question: "¿Dónde está el Cáucaso?", correct: "Entre Europa y Asia", incorrect: "Oceanía" },
      { question: "¿Dónde están los Montes Apeninos?", correct: "Italia", incorrect: "Rusia" },
      { question: "¿Dónde está el Mont Blanc?", correct: "Francia e Italia", incorrect: "España" },
      { question: "¿Dónde está el Monte Elbrus?", correct: "Cáucaso", incorrect: "Pirineos" },
      // Mesetas
      { question: "¿Dónde está la Gran Llanura Europea?", correct: "Europa", incorrect: "Asia" },
      // Islas Baleares
      { question: "¿Dónde está Mallorca?", correct: "Mediterráneo", incorrect: "Pacífico" },
      { question: "¿Dónde está Ibiza?", correct: "Mediterráneo", incorrect: "Atlántico" },
      { question: "¿Dónde está Menorca?", correct: "Mediterráneo", incorrect: "Caribe" },
      { question: "¿Dónde está Formentera?", correct: "Mediterráneo", incorrect: "Mar del Norte" },
      // Islas Canarias
      { question: "¿Dónde está La Palma?", correct: "Atlántico", incorrect: "Mediterráneo" },
      { question: "¿Dónde está El Hierro?", correct: "Atlántico", incorrect: "Pacífico" },
      { question: "¿Dónde está La Gomera?", correct: "Atlántico", incorrect: "Caribe" },
      { question: "¿Dónde está Tenerife?", correct: "Atlántico", incorrect: "Mediterráneo" },
      { question: "¿Dónde está Gran Canaria?", correct: "Atlántico", incorrect: "Mar Rojo" },
      { question: "¿Dónde está Fuerteventura?", correct: "Atlántico", incorrect: "Mar del Norte" },
      { question: "¿Dónde está Lanzarote?", correct: "Atlántico", incorrect: "Mar del Norte" },
      // Cabos y Golfos
      { question: "¿Dónde está el Golfo de Vizcaya?", correct: "Atlántico", incorrect: "Mediterráneo" },
      { question: "¿Dónde está el Golfo de Cádiz?", correct: "Atlántico", incorrect: "Caribe" },
      { question: "¿Dónde está el Delta del Ebro?", correct: "España", incorrect: "Italia" },
      { question: "¿Dónde está el Cabo de Finisterre?", correct: "España", incorrect: "Portugal" },
      { question: "¿Dónde está el Monte Teide?", correct: "Tenerife", incorrect: "Córcega" }
    ];

    let currentCardIndex = 0;
    let correctCount = 0;
    let incorrectCount = 0;

    // Función para iniciar el juego
    function startGame() {
      correctCount = 0;
      incorrectCount = 0;
      shuffleCards();
      currentCardIndex = 0;
      document.getElementById("start-button").style.display = "none";
      document.getElementById("result").style.display = "none";
      showNextCard();
    }

    // Función para mostrar la siguiente tarjeta
    function showNextCard() {
      if (currentCardIndex < cards.length) {
        const card = cards[currentCardIndex];
        document.getElementById("question").innerText = card.question;

        // Asignar opciones de forma aleatoria
        const correctOption = Math.random() < 0.5 ? 1 : 2;
        const incorrectOption = correctOption === 1 ? 2 : 1;
        document.getElementById("option" + correctOption).innerText = card.correct;
        document.getElementById("option" + incorrectOption).innerText = card.incorrect;

        // Mostrar la tarjeta
        document.getElementById("card-container").style.display = "block";
        document.getElementById("feedback").innerText = "";
      } else {
        endGame();
      }
    }

    // Función para manejar la selección de respuesta
    function selectAnswer(option) {
      const card = cards[currentCardIndex];
      const selectedAnswer = document.getElementById("option" + option).innerText;

      if (selectedAnswer === card.correct) {
        correctCount++;
        document.getElementById("feedback").innerText = "¡Correcto!";
        document.getElementById("feedback").style.color = "green";
      } else {
        incorrectCount++;
        document.getElementById("feedback").innerText = "Incorrecto. La respuesta correcta era: " + card.correct;
        document.getElementById("feedback").style.color = "red";
      }

      currentCardIndex++;
      setTimeout(showNextCard, 2000); // Mostrar la siguiente tarjeta después de 2 segundos
    }

    // Función para terminar el juego y mostrar resultados
    function endGame() {
      document.getElementById("card-container").style.display = "none";
      const resultText = `Juego terminado. Correctas: ${correctCount}, Incorrectas: ${incorrectCount}`;
      document.getElementById("result").innerText = resultText;
      document.getElementById("result").style.display = "block";
      document.getElementById("start-button").style.display = "inline-block";
    }

    // Función para mezclar las tarjetas
    function shuffleCards() {
      for (let i = cards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [cards[i], cards[j]] = [cards[j], cards[i]];
      }
    }
  </script>

</body>
</html>
