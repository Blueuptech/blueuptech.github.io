<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarjetas de Memoria</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 20px;
    }
    .card {
      display: none;
      padding: 20px;
      margin: 20px auto;
      width: 300px;
      border: 1px solid #ccc;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      background-color: #f9f9f9;
    }
    .buttons {
      margin-top: 20px;
    }
    button {
      padding: 10px 20px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .correct {
      background-color: #4caf50;
      color: white;
    }
    .incorrect {
      background-color: #f44336;
      color: white;
    }
    .result {
      margin-top: 20px;
      font-size: 18px;
      display: none;
    }
  </style>
</head>
<body>

  <h1>Tarjetas de Memoria</h1>
  <div id="card-container" class="card">
    <p id="question"></p>
    <div class="buttons">
      <button id="option1" onclick="selectAnswer(1)">Opción 1</button>
      <button id="option2" onclick="selectAnswer(2)">Opción 2</button>
    </div>
    <p id="feedback" style="margin-top: 20px; font-weight: bold;"></p>
  </div>

  <div id="result" class="result"></div>
  <button id="start-button" onclick="startGame()">Iniciar Juego</button>

  <script>
    // Lista de tarjetas de memoria con respuestas revisadas
    const cards = [
      // África
      { question: "¿Qué cordillera importante está en el norte de África?", correct: "Atlas", incorrect: "Himalaya" },
      { question: "¿Qué valle africano es conocido por su actividad tectónica?", correct: "Valle del Rift", incorrect: "Gran Llanura Siberiana" },
      { question: "¿Cuál es el desierto más grande de África?", correct: "Sáhara", incorrect: "Desierto de Gobi" },
      { question: "Nombra un cabo importante de África.", correct: "Cabo Verde", incorrect: "Cabo de Hornos" },
      { question: "¿Dónde se encuentra la Isla de Madeira?", correct: "África", incorrect: "Asia" },
      { question: "¿Qué golfo está ubicado en la costa occidental de África?", correct: "Golfo de Guinea", incorrect: "Golfo de México" },
      { question: "¿Dónde se encuentra la Península de Somalia?", correct: "África", incorrect: "Oceanía" },
      { question: "¿Qué macizo montañoso está en África?", correct: "Macizo Etíope", incorrect: "Montes Urales" },
      { question: "¿Qué isla africana es conocida por su biodiversidad?", correct: "Isla de Madagascar", incorrect: "Isla de Sumatra" },
      { question: "¿Qué cabo marca el extremo sur de África?", correct: "Cabo de Buena Esperanza", incorrect: "Cabo York" },

      // Asia
      { question: "¿Qué cordillera divide Europa y Asia?", correct: "Montes Urales", incorrect: "Los Andes" },
      { question: "¿Qué llanura es la más extensa de Asia?", correct: "Gran Llanura Siberiana", incorrect: "La Pampa" },
      { question: "¿Dónde se encuentra el Desierto de Gobi?", correct: "Asia", incorrect: "África" },
      { question: "¿Qué península está al este de Asia?", correct: "Península de Corea", incorrect: "Península de Yucatán" },
      { question: "¿Dónde se encuentra el Archipiélago Japonés?", correct: "Asia", incorrect: "Oceanía" },
      { question: "¿Qué desierto está en la Península Arábiga?", correct: "Desierto de Arabia", incorrect: "Sáhara" },
      { question: "¿Dónde se encuentra la Península Arábiga?", correct: "Asia", incorrect: "América" },
      { question: "¿Qué península se encuentra en el sur de Asia?", correct: "Península de Indostán", incorrect: "Península de Florida" },
      { question: "¿Cuál es la meseta más alta de Asia?", correct: "Meseta del Tíbet", incorrect: "Meseta Etíope" },
      { question: "¿Dónde está el Everest?", correct: "Asia", incorrect: "América del Norte" },
      { question: "¿Qué península está al sureste de Asia?", correct: "Península de Indochina", incorrect: "Península de Labrador" },
      { question: "¿Dónde se encuentra la Península de Malaca?", correct: "Asia", incorrect: "África" },
      { question: "¿Qué isla se encuentra al sur de la India?", correct: "Sri Lanka", incorrect: "Taiwán" },
      { question: "¿Dónde está la Isla de Sumatra?", correct: "Asia", incorrect: "América del Sur" },
      { question: "¿Qué isla es la tercera más grande del mundo?", correct: "Borneo", incorrect: "Jamaica" },
      { question: "¿Dónde se encuentra Taiwán?", correct: "Asia", incorrect: "Oceanía" },

      // América
      { question: "¿Dónde está Alaska?", correct: "América del Norte", incorrect: "Europa" },
      { question: "¿Qué llanura se encuentra en América del Norte?", correct: "La Gran Llanura", incorrect: "Gran Llanura Siberiana" },
      { question: "¿Dónde está la Península de Labrador?", correct: "América del Norte", incorrect: "Oceanía" },
      { question: "¿Dónde está la Península de California Baja?", correct: "América del Norte", incorrect: "Asia" },
      { question: "¿Qué isla está cerca de Canadá?", correct: "Isla de Terranova", incorrect: "Isla de Sumatra" },
      { question: "¿Dónde está la Península de Florida?", correct: "América del Norte", incorrect: "Asia" },
      { question: "¿Dónde se encuentra el Golfo de México?", correct: "América del Norte", incorrect: "África" },
      { question: "¿Dónde están las Bahamas y las Grandes Antillas?", correct: "América Central", incorrect: "Oceanía" },
      { question: "¿Dónde está la Península de Yucatán?", correct: "América del Norte", incorrect: "Asia" },
      { question: "¿Qué isla caribeña incluye dos países?", correct: "La Española", incorrect: "Taiwán" },
      { question: "¿Dónde está la Isla de Jamaica?", correct: "El Caribe", incorrect: "Oceanía" },
      { question: "¿Dónde se encuentra el Cabo de Hornos?", correct: "América del Sur", incorrect: "África" },

      // Oceanía
      { question: "¿Qué región incluye Micronesia?", correct: "Oceanía", incorrect: "Asia" },
      { question: "¿Dónde está Melanesia?", correct: "Oceanía", incorrect: "América del Norte" },
      { question: "¿Qué región incluye Polinesia?", correct: "Oceanía", incorrect: "África" },
      { question: "¿Dónde está el Estrecho de Torres?", correct: "Oceanía", incorrect: "Asia" },
      { question: "¿Qué cordillera atraviesa Australia?", correct: "Gran Cordillera Divisoria", incorrect: "Los Andes" },
      { question: "¿Dónde está el Gran Desierto de Victoria?", correct: "Australia", incorrect: "América del Norte" },
      { question: "¿Dónde se encuentra la Gran Bahía Australiana?", correct: "Australia", incorrect: "Asia" },
      { question: "¿Qué archipiélago está al sureste de Australia?", correct: "Nueva Zelanda", incorrect: "Filipinas" },
      { question: "¿Dónde está el volcán Ruapehu?", correct: "Nueva Zelanda", incorrect: "Sri Lanka" },
      { question: "¿Qué cordillera está en Nueva Zelanda?", correct: "Alpes del Sur", incorrect: "Montes Urales" },
      { question: "¿Dónde está la Isla de Tasmania?", correct: "Australia", incorrect: "África" }
    ];

    let currentCardIndex = 0;
    let correctCount = 0;
    let incorrectCount = 0;

    //
    // Función para iniciar el juego
    function startGame() {
      correctCount = 0;
      incorrectCount = 0;
      shuffleCards();
      currentCardIndex = 0;
      document.getElementById("start-button").style.display = "none";
      document.getElementById("result").style.display = "none";
      showNextCard();
    }

    // Función para mostrar la siguiente tarjeta
    function showNextCard() {
      if (currentCardIndex < cards.length) {
        const card = cards[currentCardIndex];
        document.getElementById("question").innerText = card.question;

        // Asignar opciones de forma aleatoria
        const correctOption = Math.random() < 0.5 ? 1 : 2;
        const incorrectOption = correctOption === 1 ? 2 : 1;
        document.getElementById("option" + correctOption).innerText = card.correct;
        document.getElementById("option" + incorrectOption).innerText = card.incorrect;

        // Mostrar la tarjeta
        document.getElementById("card-container").style.display = "block";
        document.getElementById("feedback").innerText = "";
      } else {
        endGame();
      }
    }

    // Función para manejar la selección de respuesta
    function selectAnswer(option) {
      const card = cards[currentCardIndex];
      const selectedAnswer = document.getElementById("option" + option).innerText;

      if (selectedAnswer === card.correct) {
        correctCount++;
        document.getElementById("feedback").innerText = "¡Correcto!";
        document.getElementById("feedback").style.color = "green";
      } else {
        incorrectCount++;
        document.getElementById("feedback").innerText = "Incorrecto. La respuesta correcta era: " + card.correct;
        document.getElementById("feedback").style.color = "red";
      }

      currentCardIndex++;
      setTimeout(showNextCard, 2000); // Mostrar la siguiente tarjeta después de 2 segundos
    }

    // Función para terminar el juego y mostrar resultados
    function endGame() {
      document.getElementById("card-container").style.display = "none";
      const resultText = `Juego terminado. Correctas: ${correctCount}, Incorrectas: ${incorrectCount}`;
      document.getElementById("result").innerText = resultText;
      document.getElementById("result").style.display = "block";
      document.getElementById("start-button").style.display = "inline-block";
    }

    // Función para mezclar las tarjetas
    function shuffleCards() {
      for (let i = cards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [cards[i], cards[j]] = [cards[j], cards[i]];
      }
    }
  </script>

</body>
</html>
