<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarjetas de Memoria</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 20px;
    }
    .card {
      display: none;
      padding: 20px;
      margin: 20px auto;
      width: 300px;
      border: 1px solid #ccc;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      background-color: #f9f9f9;
    }
    .buttons {
      margin-top: 20px;
    }
    button {
      padding: 10px 20px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .correct {
      background-color: #4caf50;
      color: white;
    }
    .incorrect {
      background-color: #f44336;
      color: white;
    }
    .result {
      margin-top: 20px;
      font-size: 18px;
      display: none;
    }
  </style>
</head>
<body>

  <h1>Tarjetas de Memoria</h1>
  <div id="card-container" class="card">
    <p id="question"></p>
    <div class="buttons">
      <button id="option1" onclick="selectAnswer(1)">Opción 1</button>
      <button id="option2" onclick="selectAnswer(2)">Opción 2</button>
    </div>
    <p id="feedback" style="margin-top: 20px; font-weight: bold;"></p>
  </div>

  <div id="result" class="result"></div>
  <button id="start-button" onclick="startGame()">Iniciar Juego</button>

  <script>
    // Lista de tarjetas de memoria con respuestas
    const cards = [
      { question: "¿Cuál es el desierto más grande de África?", correct: "Sáhara", incorrect: "Kalahari" },
      { question: "Nombra un cabo importante de África.", correct: "Cabo Verde", incorrect: "Cabo York" },
      { question: "¿Qué valle se encuentra en África?", correct: "Valle del Rift", incorrect: "Altiplano de Mongolia" },
      { question: "¿Dónde se encuentra el Himalaya?", correct: "Asia", incorrect: "América del Norte" },
      { question: "Nombra un golfo importante en Asia.", correct: "Golfo de Bengala", incorrect: "Golfo de México" },
      { question: "¿Cuál es la meseta más alta de Asia?", correct: "Meseta del Tíbet", incorrect: "Meseta de Mato Grosso" },
      { question: "¿Dónde se encuentra el Aconcagua?", correct: "América del Sur", incorrect: "Oceanía" },
      { question: "Nombra un golfo importante de América del Norte.", correct: "Golfo de México", incorrect: "Golfo de Adén" },
      { question: "¿Cuál es el río más caudaloso de América?", correct: "Río Amazonas", incorrect: "Río Mississippi" },
      { question: "¿Qué cordillera importante está en Australia?", correct: "Gran Cordillera Divisoria", incorrect: "Cordillera de los Andes" },
      { question: "Nombra un cabo importante de Oceanía.", correct: "Cabo York", incorrect: "Cabo Comorin" },
      { question: "¿Dónde está el Golfo de Carpentaria?", correct: "Oceanía", incorrect: "África" }
    ];

    let currentCardIndex = 0;
    let correctCount = 0;
    let incorrectCount = 0;

    // Función para iniciar el juego
    function startGame() {
      correctCount = 0;
      incorrectCount = 0;
      shuffleCards();
      currentCardIndex = 0;
      document.getElementById("start-button").style.display = "none";
      document.getElementById("result").style.display = "none";
      showNextCard();
    }

    // Función para mostrar la siguiente tarjeta
    function showNextCard() {
      if (currentCardIndex < cards.length) {
        const card = cards[currentCardIndex];
        document.getElementById("question").innerText = card.question;

        // Asignar opciones de forma aleatoria
        const correctOption = Math.random() < 0.5 ? 1 : 2;
        const incorrectOption = correctOption === 1 ? 2 : 1;
        document.getElementById("option" + correctOption).innerText = card.correct;
        document.getElementById("option" + incorrectOption).innerText = card.incorrect;

        // Mostrar la tarjeta
        document.getElementById("card-container").style.display = "block";
        document.getElementById("feedback").innerText = "";
      } else {
        endGame();
      }
    }

    // Función para manejar la selección de respuesta
    function selectAnswer(option) {
      const card = cards[currentCardIndex];
      const selectedAnswer = document.getElementById("option" + option).innerText;

      if (selectedAnswer === card.correct) {
        correctCount++;
        document.getElementById("feedback").innerText = "¡Correcto!";
        document.getElementById("feedback").style.color = "green";
      } else {
        incorrectCount++;
        document.getElementById("feedback").innerText = "Incorrecto. La respuesta correcta era: " + card.correct;
        document.getElementById("feedback").style.color = "red";
      }

      currentCardIndex++;
      setTimeout(showNextCard, 2000); // Mostrar la siguiente tarjeta después de 2 segundos
    }

    // Función para terminar el juego y mostrar resultados
    function endGame() {
      document.getElementById("card-container").style.display = "none";
      const resultText = `Juego terminado. Correctas: ${correctCount}, Incorrectas: ${incorrectCount}`;
      document.getElementById("result").innerText = resultText;
      document.getElementById("result").style.display = "block";
      document.getElementById("start-button").style.display = "inline-block";
    }

    // Función para mezclar las tarjetas
    function shuffleCards() {
      for (let i = cards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [cards[i], cards[j]] = [cards[j], cards[i]];
      }
    }
  </script>

</body>
</html>
