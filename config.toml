title = "CyberStrings"
baseURL = "https://navarro-bores.com/"
languageCode = "en-us"
theme = ["github.com/theNewDynamic/gohugo-theme-ananke"]
resourceDir = "../resources"

# DefaultContentLanguage = "en"
SectionPagesMenu = "main"
Paginate = 10 # this is set low for demonstrating with dummy content. Set to a higher number
googleAnalytics = ""
enableRobotsTXT = true

[languages]
  [languages.en]
    title = "CyberStrings"
    weight = 1
    contentDir = "content/en"
    [[languages.en.menu.main]]
      identifier = "home"
      name = "Home"
      url = "/"
      weight = 1
    [[languages.en.menu.main]]
      identifier = "posts"
      name = "Posts"
      url = "/posts"
      weight = 2
    [[languages.en.menu.main]]
      identifier = "about"
      name = "About"
      url = "/about"
      weight = 3
    [[languages.en.menu.main]]
      identifier = "contact"
      name = "Contact"
      url = "/contact"
      weight = 4
    [[languages.en.menu.main]]
      identifier = "isms"
      name = "ISMS"
      url = "/en/isms"
      weight = 4

  [languages.es]
    title = "CyberStrings"
    weight = 2
    contentDir = "content/es"
    [[languages.es.menu.main]]
      identifier = "home"
      name = "Inicio"
      url = "/es/"
      weight = 1
    [[languages.es.menu.main]]
      identifier = "posts"
      name = "Publicaciones"
      url = "/es/posts"
      weight = 2
    [[languages.es.menu.main]]
      identifier = "about"
      name = "Acerca de"
      url = "/es/about"
      weight = 3
    [[languages.es.menu.main]]
      identifier = "contact"
      name = "Contacto"
      url = "/es/contact"
      weight = 4
    [[languages.es.menu.main]]
      identifier = "isms"
      name = "ISMS"
      url = "/es/isms"
      weight = 4

[sitemap]
  changefreq = "monthly"
  priority = 0.5
  filename = "sitemap.xml"

[params]
  text_color = ""
  author = "Arturo Navarro"
  favicon = "images/logo_cyberstring.svg"
  site_logo = "images/logo_cyberstring.svg"
  background_color_class = "bg-black"
  recent_posts_number = 3
  commentoEnable = false

[[params.ananke_socials]]
name = "twitter"
url = "https://twitter.com/arnavarr"

[[params.ananke_socials]]
name = "GitHub"
url = "https://github.com/arnavarr"

